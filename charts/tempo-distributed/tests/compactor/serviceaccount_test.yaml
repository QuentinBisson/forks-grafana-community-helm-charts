# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: compactor ServiceAccount
templates:
  - compactor/serviceaccount.yaml
  - compactor/deployment-compactor.yaml
  - configmap-tempo.yaml

tests:
  - it: does not create a ServiceAccount by default
    template: compactor/serviceaccount.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: creates a ServiceAccount when create is true
    template: compactor/serviceaccount.yaml
    set:
      compactor.serviceAccount.create: true
    asserts:
      - equal:
          path: kind
          value: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-tempo-compactor

  - it: uses a custom name when serviceAccount.name is set
    template: compactor/serviceaccount.yaml
    set:
      compactor.serviceAccount.create: true
      compactor.serviceAccount.name: my-compactor-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-compactor-sa

  - it: applies component labels to the ServiceAccount
    template: compactor/serviceaccount.yaml
    set:
      compactor.serviceAccount.create: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: compactor

  - it: applies custom labels to the ServiceAccount
    template: compactor/serviceaccount.yaml
    set:
      compactor.serviceAccount.create: true
      compactor.serviceAccount.labels:
        team: platform
    asserts:
      - equal:
          path: metadata.labels["team"]
          value: platform

  - it: applies annotations to the ServiceAccount
    template: compactor/serviceaccount.yaml
    set:
      compactor.serviceAccount.create: true
      compactor.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/tempo-compactor
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789:role/tempo-compactor

  - it: sets automountServiceAccountToken to false by default
    template: compactor/serviceaccount.yaml
    set:
      compactor.serviceAccount.create: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: sets automountServiceAccountToken to true when configured
    template: compactor/serviceaccount.yaml
    set:
      compactor.serviceAccount.create: true
      compactor.serviceAccount.automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: sets imagePullSecrets on the ServiceAccount
    template: compactor/serviceaccount.yaml
    set:
      compactor.serviceAccount.create: true
      compactor.serviceAccount.imagePullSecrets:
        - name: my-registry-secret
    asserts:
      - contains:
          path: imagePullSecrets
          content:
            name: my-registry-secret

  - it: does not affect the deployment when serviceAccount.create is false
    template: compactor/deployment-compactor.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-tempo
